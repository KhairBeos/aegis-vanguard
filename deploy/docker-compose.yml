services:
  clickhouse:
    image: clickhouse/clickhouse-server:24.3
    container_name: aegis-clickhouse
    restart: unless-stopped
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./clickhouse/init:/docker-entrypoint-initdb.d
    environment:
      CLICKHOUSE_DB: ${CLICKHOUSE_DB:-aegis}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-aegis_khai}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-khai131104}
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --query 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    networks:
      - aegis_net

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: aegis-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - aegis_net

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: aegis-kafka
    restart: unless-stopped
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    healthcheck:
      test: ["CMD-SHELL", "cub kafka-ready -b localhost:9092 1 20"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 25s
    networks:
      - aegis_net

  kafka-init:
    image: confluentinc/cp-kafka:7.6.1
    container_name: aegis-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVER: kafka:29092
      KAFKA_TOPIC_EVENTS: ${KAFKA_TOPIC_EVENTS:-siem.events}
      KAFKA_TOPIC_ALERTS: ${KAFKA_TOPIC_ALERTS:-siem.alerts}
      KAFKA_TOPIC_EVENTS_DLQ: ${KAFKA_TOPIC_EVENTS_DLQ:-siem.events.dlq}
      KAFKA_TOPIC_PARTITIONS: 1
      KAFKA_TOPIC_REPLICATION_FACTOR: 1
    volumes:
      - ./kafka/init:/init
    command: ["bash", "/init/create-topics.sh"]
    networks:
      - aegis_net

  collector:
    build:
      context: ..
      dockerfile: deploy/docker/collector-cpp.Dockerfile
    container_name: aegis-collector
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      AEGIS_COLLECTOR_CONFIG: /app/config/prod/collector.yaml
    command: ["/src/build/debug-collector/collector/src/aegis_collector_agent", "/app/config/prod/collector.yaml"]
    volumes:
      - ../config:/app/config:ro
      - ebpf_runtime:/var/run/aegis
    networks:
      - aegis_net

  engine:
    build:
      context: ..
      dockerfile: deploy/docker/engine-cpp.Dockerfile
    container_name: aegis-engine
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    environment:
      KAFKA_BROKERS: kafka:29092
      KAFKA_TOPIC_EVENTS: ${KAFKA_TOPIC_EVENTS:-siem.events}
      KAFKA_TOPIC_ALERTS: ${KAFKA_TOPIC_ALERTS:-siem.alerts}
      KAFKA_TOPIC_EVENTS_DLQ: ${KAFKA_TOPIC_EVENTS_DLQ:-siem.events.dlq}
      KAFKA_GROUP_ID: aegis-engine
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: 8123
      CLICKHOUSE_DB: ${CLICKHOUSE_DB:-aegis}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-aegis_khai}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-khai131104}
      ENGINE_EXTERNAL_RULES_ENABLED: "1"
      ENGINE_EXTERNAL_RULES_DIR: /app/rules/runtime
      ENGINE_LOG_LEVEL: info
    command: ["/src/build/debug-engine/engine/src/aegis_engine"]
    volumes:
      - ../rules:/app/rules:ro
    networks:
      - aegis_net

  dashboard:
    build:
      context: ../dashboard
      dockerfile: Dockerfile
    container_name: aegis-dashboard
    restart: unless-stopped
    depends_on:
      - engine
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_TOPIC_ALERTS: ${KAFKA_TOPIC_ALERTS:-siem.alerts}
    ports:
      - "${DASHBOARD_PORT:-3000}:3000"
    networks:
      - aegis_net

  demo-stream:
    build:
      context: ..
      dockerfile: deploy/docker/demo-stream.Dockerfile
    container_name: aegis-demo-stream
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    environment:
      PYTHONUNBUFFERED: "1"
    command:
      - python
      - /app/scripts/demo_stream.py
      - --broker
      - kafka:29092
      - --topic
      - ${KAFKA_TOPIC_EVENTS:-siem.events}
      - --events-dir
      - /app/runtime/mordor
      - --campaign
      - /app/scripts/demo_stream_campaign.json
      - --rules-dir
      - /app/rules/runtime
      - --rate
      - ${DEMO_STREAM_RATE:-0.8}
      - --quiet
    volumes:
      - ../runtime/mordor:/app/runtime/mordor:ro
    networks:
      - aegis_net


volumes:
  clickhouse_data:
  ebpf_runtime:

networks:
  aegis_net:
    driver: bridge
