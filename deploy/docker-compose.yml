services:
  clickhouse:
    image: clickhouse/clickhouse-server:24.3
    container_name: aegis-clickhouse
    restart: unless-stopped
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./clickhouse/init:/docker-entrypoint-initdb.d
    environment:
      CLICKHOUSE_DB: ${CLICKHOUSE_DB}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --query 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    networks:
      - aegis_net

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: aegis-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - aegis_net

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: aegis-kafka
    restart: unless-stopped
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    healthcheck:
      test: ["CMD-SHELL", "cub kafka-ready -b localhost:9092 1 20"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 25s
    networks:
      - aegis_net

  kafka-init:
    image: confluentinc/cp-kafka:7.6.1
    container_name: aegis-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVER: kafka:29092
      KAFKA_TOPIC_EVENTS: ${KAFKA_TOPIC_EVENTS}
      KAFKA_TOPIC_ALERTS: ${KAFKA_TOPIC_ALERTS}
      KAFKA_TOPIC_EVENTS_DLQ: ${KAFKA_TOPIC_EVENTS_DLQ}
      KAFKA_TOPIC_PARTITIONS: 1
      KAFKA_TOPIC_REPLICATION_FACTOR: 1
    volumes:
      - ./kafka/init:/init
    command: ["bash", "/init/create-topics.sh"]
    networks:
      - aegis_net

  grafana:
    image: grafana/grafana-oss:11.1.0
    container_name: aegis-grafana
    restart: unless-stopped
    depends_on:
      clickhouse:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_INSTALL_PLUGINS: grafana-clickhouse-datasource
      CLICKHOUSE_DB: ${CLICKHOUSE_DB}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    networks:
      - aegis_net

volumes:
  clickhouse_data:
  grafana_data:

networks:
  aegis_net:
    driver: bridge
