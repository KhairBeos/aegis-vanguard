agent_id: dev-collector-01
hostname: localhost
kafka:
  brokers:
    - localhost:9092
  topic: siem.events
collection:
  process_events: true
  network_events: true
  file_events: true
  auth_events: true
runtime:
  source: synthetic
  ebpf_enabled: false
  fixture_path:
  ebpf_input_path: /var/run/aegis/ebpf-events.jsonl
  ebpf_reader_command:
  ebpf_follow: true
  poll_interval_ms: 250
  max_events: 5
  dry_run: false
  tenant_id: default
  log_level: info
