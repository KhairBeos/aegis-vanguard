id: ext-suspicious-download-exec
name: External Suspicious Download and Execute
event_type: process_start
severity: high
risk_score: 85
summary: External Sigma-like rule matched download-and-execute behavior
summary_template: Suspicious download-and-execute on {{host}} by {{event.process.user_name}}: {{event.process.cmdline}}
tags:
  - external
  - sigma-like
  - execution
match: all
conditions:
  - path: event.process.cmdline
    op: contains
    value: curl
  - path: event.process.cmdline
    op: contains
    value: "| bash"
