id: ext-smb-rdp-lateral-movement
name: External SMB RDP WinRM Lateral Movement Burst
event_type: network_connect
severity: high
risk_score: 85
summary: External rule matched repeated outbound lateral movement protocol attempts
summary_template: 'Lateral movement burst on {{host}} to {{event.network.dst_ip}}:{{event.network.dst_port}} hits={{match.current_hits}}/{{rule.min_hits}}'
tags: [external, lateral-movement, network, smb, rdp, winrm]
match: all
min_hits: 3
window_seconds: 300
alert_cooldown_seconds: 300
group_by:
  - host
  - event.network.process_guid
  - event.network.dst_ip
  - event.network.dst_port
conditions:
  - path: event.network.direction
    op: equals
    value: outbound
  - path: event.network.dst_port
    op: regex
    value: '^(445|3389|5985|5986)$'
